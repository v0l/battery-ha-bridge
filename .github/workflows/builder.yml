name: Build add-on images

on:
  push:
    branches: [main]
    paths:
      - battery_bridge/**
      - .github/workflows/builder.yml
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: ver
        run: echo "version=$(yq -r .version battery_bridge/config.yaml)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: battery_bridge
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/v0l/battery-bridge-${{ matrix.arch }}:${{ steps.ver.outputs.version }}
            ghcr.io/v0l/battery-bridge-${{ matrix.arch }}:latest
          labels: |
            io.hass.name=Battery Control Bridge
            io.hass.description=Expose batteries to Home Assistant via MQTT Discovery
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            io.hass.version=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
